<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>吉铁大 · DeepSeek V3 助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f3f5f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    .app {
      max-width: 600px;
      width: 100%;
      height: 750px;
      background: #ffffff;
      border-radius: 36px;
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .header {
      padding: 20px;
      border-bottom: 1px solid #eff1f4;
      background: white;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 650;
      background: linear-gradient(135deg, #1a3e6f, #2563ab);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .badge {
      background: #eef2ff;
      color: #1e4a7a;
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 500;
      margin-left: auto;
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #fafbfc;
    }
    .message {
      display: flex;
      gap: 10px;
      max-width: 100%;
    }
    .message.user {
      flex-direction: row-reverse;
    }
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 40px;
      background: #e4e9f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .message.user .avatar {
      background: #1a3e6f;
      color: white;
    }
    .bubble {
      background: white;
      padding: 14px 16px;
      border-radius: 20px;
      border-top-left-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      border: 1px solid #eceff4;
      max-width: 85%;
      font-size: 15px;
      line-height: 1.5;
      color: #1e293b;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .bubble {
      background: #1a3e6f;
      color: white;
      border: none;
      border-top-right-radius: 6px;
      border-top-left-radius: 20px;
    }
    .input-area {
      padding: 16px;
      background: white;
      border-top: 1px solid #eef2f6;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-wrapper {
      flex: 1;
      background: #f2f6fa;
      border-radius: 30px;
      padding: 4px 4px 4px 18px;
      display: flex;
      align-items: center;
      border: 1px solid #e2e9f2;
    }
    .input-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 15px;
      padding: 12px 0;
      outline: none;
      color: #1e293b;
    }
    .input-wrapper input::placeholder {
      color: #9aabbf;
    }
    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 40px;
      background: #1a3e6f;
      border: none;
      color: white;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 4px 10px rgba(26,62,111,0.2);
      flex-shrink: 0;
    }
    .send-btn:hover {
      background: #0f2e52;
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🚞 吉铁大·DeepSeek V3</h1>
    <span class="badge">免费AI代理</span>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="message assistant">
      <div class="avatar">🤖</div>
      <div class="bubble">
        👋 你好！我是基于 DeepSeek V3 大模型的校园助手。<br><br>
        💡 你可以问我任何问题，比如：<br>
        • 校园网密码是多少？<br>
        • 图书馆几点开门？<br>
        • 一食堂在哪儿？<br>
        • 905路怎么坐？<br><br>
        直接打字或语音输入吧～
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <input type="text" id="userInput" placeholder="问我任何问题..." autocomplete="off" />
    </div>
    <button class="send-btn" id="sendBtn">↑</button>
  </div>
</div>

<script>
  (function(){
    // ========== 配置区 ==========
    // 使用免费 DeepSeek 代理，无需 API Key，开箱即用
    const API_URL = 'https://free-deepseek-api.vercel.app/api/chat';
    
    // 系统提示词（让 AI 扮演校园助手）
    const SYSTEM_PROMPT = `你是吉林铁道职业技术大学的校园AI助手，名叫“铁铁”。请用热情、友好的语气回答关于校园的一切问题。
你了解以下核心信息：
- 学校地址：吉林省吉林市永吉经济开发区吉桦东路1号。
- 校园布局：主教学楼—图书馆为中轴线，东侧生活区，西侧教学区。
- 宿舍：22:00闭寝，没有独立卫浴，公共澡堂，22点断电不断网，禁止大功率电器。
- 食堂：一食堂、二食堂，营业时间6:00-22:00，一食堂更好吃，支持微信支付。
- 图书馆：开放时间8:00-21:00（周一至周日）。
- 交通：吉林站西广场乘905路可达学校。
- 校园网：账号为学号，密码为Tddx@身份证后六位。
- 上课时间：上午8:00-11:30，下午13:10-16:30。
如果用户问的问题你不太确定，请如实告知并建议拨打招生办电话0432-64205999咨询。`;

    // ========== DOM 元素 ==========
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // 滚动到底部
    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 添加一条消息
    function addMessage(content, role) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '🧑' : '🤖';
      
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;
      
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(bubble);
      chatContainer.appendChild(messageDiv);
      scrollToBottom();
      return messageDiv;
    }

    // 显示加载中
    function addLoadingMessage() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.innerHTML = '<div class="avatar">🤖</div><div class="bubble"><span class="loading-dots">思考中</span></div>';
      chatContainer.appendChild(div);
      scrollToBottom();
      return div;
    }

    // 调用 DeepSeek API（免费代理）
    async function callDeepSeek(userMessage) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              { role: 'user', content: userMessage }
            ]
          })
        });
        
        const data = await response.json();
        
        // 免费代理返回格式可能是 { reply: "..." } 或 { choices: [...] }
        if (data.reply) {
          return data.reply;
        } else if (data.choices && data.choices[0] && data.choices[0].message) {
          return data.choices[0].message.content;
        } else {
          console.error('未知返回格式:', data);
          return '抱歉，AI 返回了未知格式的数据，请稍后再试。';
        }
      } catch (error) {
        console.error('API 调用失败:', error);
        throw error;
      }
    }

    // 发送消息主逻辑
    async function handleSend() {
      const text = userInput.value.trim();
      if (!text) return;
      
      // 显示用户消息
      addMessage(text, 'user');
      userInput.value = '';
      
      // 显示加载状态
      const loadingDiv = addLoadingMessage();
      
      try {
        const reply = await callDeepSeek(text);
        loadingDiv.remove();
        addMessage(reply, 'assistant');
      } catch (error) {
        loadingDiv.remove();
        addMessage('网络连接失败，请稍后再试。', 'assistant');
      }
    }

    // 事件绑定
    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleSend();
      }
    });

    // 初始滚动
    scrollToBottom();
  })();
</script>
</body>
</html>
